<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#1B4965"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#C9A84C"/>

  <!-- Left content -->
  <!-- Badge -->
  <rect x="72" y="72" width="280" height="36" rx="18" fill="#ffffff" fill-opacity="0.08"/>
  <text x="212" y="96" font-family="Georgia, serif" font-size="13" fill="#C9A84C" text-anchor="middle" letter-spacing="2">BUILT FOR SA PARENTS</text>

  <!-- Main headline -->
  <text x="72" y="188" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#ffffff">Plan for your</text>
  <text x="72" y="262" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#C9A84C">child's school fees</text>
  <text x="72" y="336" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#ffffff">before it's too late.</text>

  <!-- Sub text -->
  <text x="72" y="396" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.6">See total costs to matric · Monthly savings target · PDF report</text>

  <!-- Domain -->
  <text x="72" y="556" font-family="Arial, sans-serif" font-size="20" fill="#C9A84C" fill-opacity="0.9">schoolfees.ashlunar.dev</text>

  <!-- Right side — stat cards -->
  <!-- Card 1 -->
  <rect x="740" y="72" width="388" height="148" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="764" y="116" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">PUBLIC SCHOOL · AGE 6</text>
  <text x="764" y="166" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#ffffff">R 320 000</text>
  <text x="764" y="196" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C">Save approx R 1 850 / month</text>

  <!-- Card 2 -->
  <rect x="740" y="242" width="388" height="148" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="764" y="286" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">INDEPENDENT · AGE 4</text>
  <text x="764" y="336" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#ffffff">R 1 640 000</text>
  <text x="764" y="366" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C">Save approx R 6 200 / month</text>

  <!-- Card 3 -->
  <rect x="740" y="412" width="388" height="148" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="764" y="456" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.5" letter-spacing="1">PRIVATE SCHOOL · AGE 3</text>
  <text x="764" y="506" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#ffffff">R 8 700 000</text>
  <text x="764" y="536" font-family="Arial, sans-serif" font-size="14" fill="#C9A84C">Save approx R 14 800 / month</text>

  <!-- Bottom disclaimer -->
  <text x="72" y="600" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.25">Estimates only. Assumes 8% fee inflation from 2025 fee data. Not financial advice.</text>
</svg>
